services:
  backend:
    image: registry.redptam.com/foodipe-backend:latest
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongoadmin:${MONGO_ROOT_PASSWORD}@mongo:27017/foodipe?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      - mongo
    restart: always

  frontend:
    image: registry.redptam.com/foodipe-frontend:latest
    container_name: foodipe-frontend
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    restart: always

  mongo:
    image: mongo:8.0
    container_name: mongodb_prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  mongo-data:

networks:
  default:
    name: docker-registry_default
    external: true
