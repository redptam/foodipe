services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    environment:
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    depends_on:
      - mongo
    command: >
      sh -c "if [ ! -f package.json ]; then npm init -y && npm install express mongoose cors dotenv openai jsonwebtoken axios cheerio; fi &&
             npm install jsonwebtoken axios cheerio &&  npm install &&
             npm run start --if-present || node src/server.js || tail -f /dev/null"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0"

  mongo:
    image: mongo:8.0
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    # NOTE: Port 27017 intentionally NOT exposed to host.
    # Access is only available within the Docker network.
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
